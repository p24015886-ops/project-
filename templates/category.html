<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Start Quiz | SciSparkQuiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body{
    font-family:'Poppins',sans-serif;
    background: radial-gradient(circle at top,#003a5f,#020b1a);
    color:white;
    height:100vh;
    overflow:hidden;
}

.container{
    display:flex;
    height:100vh;
}

/* ===== COMMON SIDEBAR ===== */
.sidebar{
    width:260px;
    background:linear-gradient(180deg,#051a30,#020b1a);
    padding:25px;
    border-right:1px solid rgba(0,229,255,0.1);
    flex-shrink:0;
}

.brand-title{
    font-family:'Orbitron',sans-serif;
    color:#00e5ff;
    font-size:20px;
    margin-bottom:40px;
}

.menu-section{
    font-size:10px;
    text-transform:uppercase;
    color:rgba(255,255,255,0.3);
    margin:20px 0 8px;
    letter-spacing:1px;
}

.menu a{
    display:block;
    padding:12px 14px;
    margin-bottom:8px;
    border-radius:12px;
    text-decoration:none;
    color:#e0f7ff;
    background:rgba(255,255,255,0.05);
    transition:0.3s;
    font-size:14px;
}

.menu a:hover,
.menu a.active{
    background:rgba(0,229,255,0.25);
    transform:translateX(6px);
    color:#fff;
}

/* ===== MAIN CONTENT ===== */
.main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow-y:auto;
    padding:40px;
}

.main::-webkit-scrollbar{width:8px;}
.main::-webkit-scrollbar-thumb{
    background:rgba(0,229,255,0.3);
    border-radius:10px;
}

/* ===== PANEL ===== */
.search-panel{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    padding:40px 60px;
    border-radius:20px;
    width:100%;
    max-width:700px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
    border:1px solid rgba(0,229,255,0.15);
}

h1{
    font-family:'Orbitron',sans-serif;
    color:#00e5ff;
    margin-bottom:30px;
    text-align:center;
}

label{
    display:block;
    margin-bottom:8px;
    color:#9adfff;
    font-size:14px;
}

select{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid rgba(255,255,255,0.2);
    background:#051a30;
    color:#fff;
    margin-bottom:20px;
    font-family:'Poppins',sans-serif;
}

select:focus{
    outline:none;
    border-color:#00e5ff;
}

.error-msg{
    color:#ff6b6b;
    font-size:13px;
    margin-bottom:15px;
    display:none;
}

.loading-text{
    color:#9adfff;
    font-size:13px;
    text-align:center;
    margin-bottom:20px;
    display:none;
}

button{
    width:100%;
    padding:14px;
    border-radius:30px;
    border:none;
    background:#00e5ff;
    color:#020b1a;
    font-weight:bold;
    cursor:pointer;
    font-family:'Poppins',sans-serif;
    font-size:15px;
    transition:0.3s;
}

button:hover:not(:disabled){
    background:#fff;
    box-shadow:0 0 20px rgba(0,229,255,0.4);
}

button:disabled{
    background:#1a3044;
    cursor:not-allowed;
    color:#5a8aa0;
}
</style>
</head>

<body>

<div class="container">

    <!-- ===== COMMON NAVIGATION ===== -->
    <div class="sidebar">
        <div class="brand-title">GRAVITON</div>

        <div class="menu">

            <div class="menu-section">Main</div>
            <a href="{{ url_for('home') }}">🏠 Home</a>
            <a href="{{ url_for('videos') }}">📹 Videos</a>

            <div class="menu-section">Staff</div>
            <a href="{{ url_for('make_quiz') }}">📝 Create Quiz</a>
            <a href="{{ url_for('games') }}">🎮 Create Game</a>

            <div class="menu-section">Students</div>
            <a href="{{ url_for('category') }}" class="active">🚀 Start Quiz</a>
            <a href="{{ url_for('start_games') }}">🕹️ Start Games</a>

        </div>
    </div>

    <!-- ===== MAIN ===== -->
    <div class="main">
        <div class="search-panel">

            <h1>🚀 Start Quiz</h1>

            <form action="/quiz" method="GET" onsubmit="return validateForm()">

                <label>Select Category:</label>
                <select id="categorySelect" name="category" required onchange="loadWorkshops()">
                    <option value="" disabled selected>-- Choose Category --</option>
                    <option value="Physics">Physics</option>
                    <option value="Chemistry">Chemistry</option>
                    <option value="Biology">Biology</option>
                    <option value="Technology">Technology</option>
                    <option value="General Science">General Science</option>
                </select>

                <label>Select Level:</label>
                <select id="levelSelect" name="level" required onchange="loadWorkshops()">
                    <option value="" disabled selected>-- Choose Level --</option>
                    <option value="Upper Primary">Upper Primary</option>
                    <option value="Lower Primary">Lower Primary</option>
                    <option value="Upper Secondary">Upper Secondary</option>
                    <option value="Lower Secondary">Lower Secondary</option>
                </select>

                <label>Select Workshop / Quiz:</label>
                <div class="loading-text" id="loadingText">⏳ Loading workshops...</div>

                <select id="workshopSelect" name="workshop_id" required disabled>
                    <option value="" disabled selected>-- Select Category & Level First --</option>
                </select>

                <div class="error-msg" id="errorMsg">
                    No workshops found for this selection. Please create a quiz first.
                </div>

                <button type="submit" id="submitBtn" disabled>
                    START QUIZ ✔
                </button>

            </form>

        </div>
    </div>

</div>

<script>
const categorySelect = document.getElementById("categorySelect");
const levelSelect    = document.getElementById("levelSelect");
const workshopSelect = document.getElementById("workshopSelect");
const submitBtn      = document.getElementById("submitBtn");
const errorMsg       = document.getElementById("errorMsg");
const loadingText    = document.getElementById("loadingText");

function loadWorkshops(){
    const category = categorySelect.value;
    const level    = levelSelect.value;
    if(!category || !level) return;

    workshopSelect.innerHTML = '<option disabled selected>-- Select Workshop --</option>';
    workshopSelect.disabled  = true;
    submitBtn.disabled       = true;
    errorMsg.style.display   = "none";
    loadingText.style.display = "block";

    fetch(`/get-workshops/${encodeURIComponent(category)}?level=${encodeURIComponent(level)}`)
    .then(res => res.json())
    .then(data => {
        loadingText.style.display = "none";

        if(data.length === 0){
            workshopSelect.innerHTML = '<option disabled>No workshops found</option>';
            errorMsg.style.display = "block";
            return;
        }

        data.forEach(w => {
            const opt = document.createElement("option");
            opt.value = w.id;
            opt.textContent = w.title;
            workshopSelect.appendChild(opt);
        });

        workshopSelect.disabled = false;
    })
    .catch(() => {
        loadingText.style.display = "none";
        workshopSelect.innerHTML = '<option disabled>Error loading workshops</option>';
    });
}

workshopSelect.addEventListener("change",()=>{
    submitBtn.disabled = !workshopSelect.value;
});

function validateForm(){
    if(!workshopSelect.value){
        alert("Please select a workshop.");
        return false;
    }
    return true;
}
</script>

</body>
</html>
