<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Choose Category | SciSparkQuiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Poppins&display=swap" rel="stylesheet">
<style>
    body{ margin:0; font-family:Poppins, sans-serif; background: radial-gradient(circle at top, #003a5f, #020b1a); color:white; height:100vh; }
    .container{ display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column; }
    h1{ font-family:Orbitron; margin-bottom:40px; }
    .categories{ display:flex; gap:40px; }
    .category-btn{ width:280px; height:140px; font-size:20px; border-radius:25px; border:2px solid #00e5ff; background:rgba(0,229,255,0.08); color:#00e5ff; cursor:pointer; transition:.3s; }
    .category-btn:hover{ background:#00e5ff; color:#041424; }
    .back{ margin-top:50px; color:#9adfff; cursor:pointer; text-decoration: none; }
</style>
</head>
<body>
<div class="container">
    <h1>Select Category</h1>
    <div class="categories">
        <button class="category-btn" onclick="goQuiz('lower')">Lower Primary</button>
        <button class="category-btn" onclick="goQuiz('upper')">Upper Primary</button>
        <button class="category-btn" onclick="goQuiz('secondary')">Lower Secondary</button>
    </div>
    <a href="{{ url_for('home') }}" class="back">⬅ Back to Home</a>
</div>
<script>
function goQuiz(level){
    window.location.href = "{{ url_for('start_quiz') }}?level=" + level;
}
</script>
</body>
</html>
