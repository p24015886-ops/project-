<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SciSparkQuiz | Game Play</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #003a5f, #020b1a);
    color: white;
}

.top-bar {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
}

.back-btn {
    background: #00e5ff;
    border: none;
    padding: 10px 20px;
    border-radius: 20px;
    font-weight: bold;
    cursor: pointer;
}

.container {
    max-width: 900px;
    margin: 40px auto;
    background: rgba(255,255,255,0.06);
    padding: 40px;
    border-radius: 25px;
    text-align: center;
}

.question {
    font-size: 26px;
    margin-bottom: 30px;
}

.options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.option {
    background: rgba(0,229,255,0.15);
    padding: 18px;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.option:hover {
    background: rgba(0,229,255,0.35);
}

.correct {
    background: #4CAF50 !important;
}

.wrong {
    background: #E53935 !important;
}

.score {
    margin-top: 25px;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="top-bar">
    <button class="back-btn" onclick="location.href='/'">⬅ Back</button>
    <div class="score">Score: <span id="score">0</span></div>
</div>

<div class="container">
    <div class="question" id="question">Loading...</div>

    <div class="options">
        <div class="option" onclick="checkAnswer('A')" id="A"></div>
        <div class="option" onclick="checkAnswer('B')" id="B"></div>
        <div class="option" onclick="checkAnswer('C')" id="C"></div>
        <div class="option" onclick="checkAnswer('D')" id="D"></div>
    </div>
</div>

<script>
let correctOption = "";
let score = 0;

function loadQuestion() {
    fetch("/get-question")
        .then(res => res.json())
        .then(q => {
            document.getElementById("question").innerText = q.question;
            document.getElementById("A").innerText = q.option_a;
            document.getElementById("B").innerText = q.option_b;
            document.getElementById("C").innerText = q.option_c;
            document.getElementById("D").innerText = q.option_d;
            correctOption = q.correct_option;

            document.querySelectorAll(".option").forEach(o => {
                o.classList.remove("correct", "wrong");
            });
        });
}

function checkAnswer(choice) {
    if (choice === correctOption) {
        document.getElementById(choice).classList.add("correct");
        score += 10;
        document.getElementById("score").innerText = score;
    } else {
        document.getElementById(choice).classList.add("wrong");
    }

    setTimeout(loadQuestion, 1200);
}

loadQuestion();
</script>

</body>
</html>
