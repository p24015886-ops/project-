<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SciSparkQuiz | Graviton</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: radial-gradient(circle at top, #003a5f, #020b1a); color: white; height: 100vh; overflow: hidden; }
    .container { display: flex; height: 100vh; }
    .sidebar { width: 260px; background: linear-gradient(180deg, #051a30, #020b1a); padding: 25px; z-index: 5; }
    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
    .brand-title { font-family: 'Orbitron', sans-serif; color: #00e5ff; font-size: 20px; }
    .menu a { display: block; padding: 14px; margin-bottom: 12px; border-radius: 12px; text-decoration: none; color: #e0f7ff; background: rgba(255,255,255,0.05); transition: 0.3s; }
    .menu a:hover { background: rgba(0,229,255,0.25); transform: translateX(6px); }
    .main { flex: 1; padding: 50px; position: relative; text-align: center; }
    .hero h1 { font-family: 'Orbitron', sans-serif; font-size: 42px; margin-top: 50px; }
    .actions { display: flex; justify-content: center; gap: 40px; margin-top: 70px; }
    .action-card { width: 320px; padding: 35px; background: rgba(255,255,255,0.06); border-radius: 25px; box-shadow: 0 0 35px rgba(0,229,255,0.2); transition: 0.3s; }
    .action-card button { margin-top: 20px; width: 100%; padding: 14px; border-radius: 30px; border: none; background: #00e5ff; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <div class="brand">
            <div class="brand-title">GRAVITON</div>
        </div>
        <div class="menu">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('make_quiz') }}">Create Quiz</a>
            <a href="{{ url_for('games') }}">Games</a>
            <a href="{{ url_for('videos') }}">Videos</a>
        </div>
    </div>
    <div class="main">
        <div class="hero">
            <h1>Welcome to SciSparkQuiz 🚀</h1>
            <p>Interactive science learning through quizzes, games, and workshops</p>
        </div>
        <div class="actions">
            <div class="action-card">
                <h2>Take Quiz</h2>
                <button onclick="location.href='{{ url_for('category') }}'">Start Quiz</button>
            </div>
            <div class="action-card">
                <h2>Play Games</h2>
                <button onclick="location.href='{{ url_for('games') }}'">Start Games</button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
