<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SciSparkQuiz | Quiz Session</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top, #003a5f, #020b1a);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: row;
            overflow: hidden; /* Prevent body scroll, use container scroll */
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 260px;
            background: #010816;
            padding: 25px;
            border-right: 1px solid rgba(0, 229, 255, 0.1);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        
        @media (max-width: 768px) {
            .sidebar { display: none; } /* Hide sidebar on mobile for better focus */
        }

        .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
        .brand-title { font-family: 'Orbitron', sans-serif; color: #00e5ff; font-size: 20px; }

        .menu-section { font-size: 10px; text-transform: uppercase; color: rgba(255,255,255,0.3); margin: 20px 0 8px; letter-spacing: 1px; }
        .menu a {
            display: block; padding: 14px; margin-bottom: 12px; border-radius: 12px;
            text-decoration: none; color: #e0f7ff; background: rgba(255,255,255,0.05);
            transition: 0.3s; font-size: 14px;
        }
        .menu a:hover, .menu a.active { background: rgba(0,229,255,0.25); color: #fff; }

        /* ===== MAIN CONTENT ===== */
        .main { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            height: 100vh;
        }

        .glass-card {
            width: 100%;
            max-width: 820px;
            max-height: 95vh; /* Ensure card doesn't exceed screen height */
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(10px);
            padding: clamp(20px, 5vw, 50px); /* Fluid padding */
            border-radius: 30px;
            border: 1px solid rgba(0, 229, 255, 0.15);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        h1 { font-family: 'Orbitron', sans-serif; font-size: clamp(18px, 4vw, 28px); color: #00e5ff; letter-spacing: 1px; }

        .stat-badge {
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid rgba(0, 229, 255, 0.3);
            padding: 6px 14px;
            border-radius: 10px;
            font-family: 'Orbitron', sans-serif;
            color: #00e5ff;
            font-size: clamp(10px, 2vw, 13px);
        }

        .divider { 
            width: 100%; 
            height: 4px; 
            background: rgba(255,255,255,0.1); 
            border-radius: 10px; 
            margin-bottom: 25px; 
            position: relative; 
            overflow: hidden; 
            flex-shrink: 0;
        }
        .progress-fill { height: 100%; background: #00e5ff; width: 0%; transition: width 0.4s; }

        /* Scrollable content area inside the card */
        .scrollable-content {
            overflow-y: auto;
            flex: 1;
            padding-right: 5px; /* space for scrollbar */
        }

        .setup-form { display: flex; flex-direction: column; gap: 15px; }
        .setup-form label { font-family: 'Orbitron', sans-serif; font-size: 10px; color: #00e5ff; margin-bottom: -10px; opacity: 0.7; }
        select {
            background: rgba(5, 26, 48, 0.8);
            border: 1px solid rgba(0, 229, 255, 0.2);
            color: white;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }
        select:focus { border-color: #00e5ff; }

        .content-section { display: none; }
        .content-section.active { display: flex; flex-direction: column; height: 100%; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .question-text { font-size: clamp(18px, 3vw, 22px); margin-bottom: 20px; line-height: 1.4; font-weight: 500; }

        .options-grid { display: grid; gap: 12px; }
        .option {
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
        }
        .option:hover:not(.locked) { background: rgba(0, 229, 255, 0.1); border-color: #00e5ff; transform: translateX(5px); }
        .option.correct { background: rgba(46, 204, 113, 0.2); border-color: #2ecc71; }
        .option.wrong { background: rgba(231, 76, 60, 0.2); border-color: #e74c3c; }

        .nav-controls { 
            display: flex; 
            justify-content: space-between; 
            margin-top: 30px; 
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
        }
        
        .btn-pill {
            padding: 12px 25px;
            border-radius: 30px;
            border: none;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            font-size: 13px;
            white-space: nowrap;
        }
        .btn-prev { background: rgba(255, 255, 255, 0.1); color: white; }
        .btn-next { background: #00e5ff; color: #020b1a; }
        .btn-pill:disabled { opacity: 0.3; cursor: not-allowed; }

        .feedback { margin-top: 15px; font-weight: 600; text-align: center; font-family: 'Orbitron', sans-serif; min-height: 24px; font-size: 14px; flex-shrink: 0; }

        /* Custom Scrollbar for the card */
        .scrollable-content::-webkit-scrollbar { width: 5px; }
        .scrollable-content::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        .scrollable-content::-webkit-scrollbar-thumb { background: rgba(0, 229, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="brand"><div class="brand-title">GRAVITON</div></div>
    <div class="menu">
        <div class="menu-section">Main</div>
        <a href="/">🏠 Home</a>
        <a href="/videos">📹 Videos</a>
        <div class="menu-section">Staff</div>
        <a href="/make-quiz">📝 Create Quiz</a>
        <div class="menu-section">Students</div>
        <a href="/quiz" class="active">🚀 Start Quiz</a>
    </div>
</div>

<div class="main">
    <div class="glass-card">
        <div class="quiz-header">
            <h1 id="headerTitle">Science Challenge</h1>
            <div class="stats-bar">
                <div class="stat-badge">Score: <span id="scoreDisplay">0</span></div>
            </div>
        </div>

        <div class="divider">
            <div id="progressBar" class="progress-fill"></div>
        </div>

        <!-- STEP 1: SELECTION -->
        <div id="setupSection" class="content-section active">
            <div class="scrollable-content">
                <div class="setup-form">
                    <p style="color: rgba(255,255,255,0.6); margin-bottom: 10px; font-size: 14px;">Select a subject and quiz to begin your session.</p>

                    <label>SUBJECT</label>
                    <select id="categorySelect" onchange="loadWorkshops()">
                        <option value="" selected disabled>-- Choose Category --</option>
                        <option value="Physics">Physics</option>
                        <option value="Chemistry">Chemistry</option>
                        <option value="Biology">Biology</option>
                        <option value="Technology">Technology</option>
                        <option value="General Science">General Science</option>
                    </select>

                    <label>QUIZ WORKSHOP</label>
                    <select id="workshopSelect" disabled>
                        <option value="" selected disabled>Select subject first...</option>
                    </select>
                </div>
            </div>
            <div class="nav-controls" style="justify-content: flex-end;">
                <button class="btn-pill btn-next" id="startBtn" onclick="startQuizSession()" disabled>
                    Launch Quiz ➡
                </button>
            </div>
        </div>

        <!-- STEP 2: QUIZ -->
        <div id="quizSection" class="content-section">
            <div class="scrollable-content" id="questionArea">
                <!-- Question content injected here -->
            </div>
            
            <div class="feedback" id="feedback"></div>
            
            <div class="nav-controls">
                <button class="btn-pill btn-prev" id="prevBtn" onclick="navigate(-1)">← Previous</button>
                <button class="btn-pill btn-next" id="nextBtn" onclick="navigate(1)">Next ➡</button>
            </div>
        </div>
    </div>
</div>

<script>
    let questions = [];
    let currentIndex = 0;
    let userAnswers = [];
    let score = 0;

    async function loadWorkshops() {
        const cat = document.getElementById('categorySelect').value;
        const wsSelect = document.getElementById('workshopSelect');
        wsSelect.disabled = true;
        wsSelect.innerHTML = '<option disabled selected>⏳ Loading workshops...</option>';

        try {
            const res = await fetch(`/get-workshops?category=${encodeURIComponent(cat)}`);
            const data = await res.json();

            wsSelect.innerHTML = '<option value="" disabled selected>-- Select a Workshop --</option>';
            if(!data || data.length === 0) {
                wsSelect.innerHTML = '<option disabled>No quizzes found for this subject</option>';
            } else {
                data.forEach(ws => {
                    const opt = document.createElement('option');
                    opt.value = ws.id;
                    opt.innerText = ws.title;
                    wsSelect.appendChild(opt);
                });
                wsSelect.disabled = false;
            }
        } catch(e) {
            console.error("Fetch Error:", e);
            wsSelect.innerHTML = '<option disabled>Error loading data</option>';
        }
    }

    document.getElementById('workshopSelect').addEventListener('change', () => {
        document.getElementById('startBtn').disabled = !document.getElementById('workshopSelect').value;
    });

    async function startQuizSession() {
        const wsId = document.getElementById('workshopSelect').value;
        const wsTitle = document.getElementById('workshopSelect').options[document.getElementById('workshopSelect').selectedIndex].text;

        try {
            const res = await fetch(`/api/workshop-questions/${wsId}`);
            if (!res.ok) throw new Error("Quiz questions not found");

            questions = await res.json();
            if (questions.length === 0) { alert("This quiz has no questions yet!"); return; }

            userAnswers = new Array(questions.length).fill(null);
            score = 0;
            currentIndex = 0;
            document.getElementById('scoreDisplay').innerText = "0";
            document.getElementById('headerTitle').innerText = wsTitle;
            document.getElementById('setupSection').classList.remove('active');
            document.getElementById('quizSection').classList.add('active');

            renderQuestion();
            updateUI();
        } catch(e) {
            console.error(e);
            alert("Error loading quiz questions.");
        }
    }

    function renderQuestion() {
        const q = questions[currentIndex];
        const area = document.getElementById('questionArea');
        area.innerHTML = `
            <p class="question-text">${currentIndex + 1}. ${q.text}</p>
            <div class="options-grid">
                ${['a','b','c','d'].map(l => {
                    const letter = l.toUpperCase();
                    const isSelected = userAnswers[currentIndex] === letter;
                    const correct = q.answer.toUpperCase();
                    let cls = "";
                    if(isSelected) cls = (letter === correct) ? 'correct' : 'wrong';
                    if(userAnswers[currentIndex] !== null && letter === correct) cls = 'correct';

                    return `
                        <div class="option ${cls} ${userAnswers[currentIndex] !== null ? 'locked' : ''}"
                             onclick="handleSelect('${letter}')">
                            <div style="width:24px; font-weight:800; color:#00e5ff; flex-shrink:0;">${letter}</div>
                            <span>${q[l]}</span>
                        </div>
                    `;
                }).join('')}
            </div>
        `;
    }

    function handleSelect(ans) {
        if (userAnswers[currentIndex] !== null) return;
        const correct = questions[currentIndex].answer.toUpperCase();
        userAnswers[currentIndex] = ans;

        if (ans === correct) {
            score += 1;
            document.getElementById('scoreDisplay').innerText = score * 10;
        }

        renderQuestion();
        const feedback = document.getElementById('feedback');
        feedback.innerText = (ans === correct) ? "🎉 Correct!" : `❌ Wrong! Correct answer was ${correct}`;
        feedback.style.color = (ans === correct) ? "#2ecc71" : "#e74c3c";
    }

    function navigate(step) {
        if (currentIndex + step >= 0 && currentIndex + step < questions.length) {
            currentIndex += step;
            document.getElementById('feedback').innerText = "";
            renderQuestion();
            updateUI();
        } else if (currentIndex + step === questions.length) {
            finish();
        }
    }

    function updateUI() {
        document.getElementById('prevBtn').disabled = (currentIndex === 0);
        document.getElementById('progressBar').style.width = ((currentIndex + 1) / questions.length * 100) + "%";
        document.getElementById('nextBtn').innerHTML = (currentIndex === questions.length - 1) ? 'Finish ✔' : 'Next ➡';
    }

    function finish() {
        const correctCount = userAnswers.filter((a, i) => a === questions[i].answer.toUpperCase()).length;
        window.location.href = `/result?score=${correctCount}&total=${questions.length}`;
    }
</script>

</body>
</html>
