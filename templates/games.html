<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SciSparkQuiz | Game Play</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins&display=swap" rel="stylesheet">
<style>
    body { margin: 0; font-family: 'Poppins', sans-serif; background: radial-gradient(circle at top, #003a5f, #020b1a); color: white; }
    .top-bar { display: flex; justify-content: space-between; padding: 20px 40px; }
    .back-btn { background: #00e5ff; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; color: #020b1a; }
    .container { max-width: 800px; margin: 40px auto; background: rgba(255,255,255,0.06); padding: 40px; border-radius: 25px; text-align: center; border: 1px solid rgba(0,229,255,0.3); }
    .question { font-size: 24px; margin-bottom: 30px; min-height: 80px; }
    .options { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .option { background: rgba(0,229,255,0.1); padding: 20px; border-radius: 15px; cursor: pointer; transition: 0.3s; border: 1px solid rgba(0,229,255,0.2); }
    .option:hover { background: rgba(0,229,255,0.3); }
    .correct { background: #2ecc71 !important; border-color: #27ae60; }
    .wrong { background: #e74c3c !important; border-color: #c0392b; }
    .score-display { font-family: 'Orbitron', sans-serif; color: #00e5ff; font-size: 1.2rem; }
</style>
</head>
<body>

<div class="top-bar">
    <button class="back-btn" onclick="location.href='{{ url_for('games') }}'">⬅ Back</button>
    <div class="score-display">Score: <span id="score">0</span></div>
</div>

<div class="container">
    <div class="question" id="question">Initializing Laboratory...</div>

    <div class="options">
        <div class="option" onclick="checkAnswer('A')" id="A"></div>
        <div class="option" onclick="checkAnswer('B')" id="B"></div>
        <div class="option" onclick="checkAnswer('C')" id="C"></div>
        <div class="option" onclick="checkAnswer('D')" id="D"></div>
    </div>
</div>

<!-- Load the centralized game logic -->
<script src="{{ url_for('static', filename='js/game.js') }}"></script>

</body>
</html>
