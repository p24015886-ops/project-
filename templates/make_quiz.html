<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Management Console | SciSparkQuiz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Poppins&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{ font-family:Poppins,sans-serif; background:radial-gradient(circle at top,#003a5f,#020b1a); color:white; min-height:100vh; padding-bottom: 50px; }
        .header{ padding:30px 60px; display:flex; align-items:center; justify-content: space-between; border-bottom: 1px solid rgba(0,229,255,0.2); }
        .header h1{ font-family:Orbitron; color:#00e5ff; font-size: 24px; }
        .container{ max-width:1100px; margin:40px auto; display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px; padding: 0 20px; }
        
        .panel{ background:rgba(255,255,255,.05); backdrop-filter:blur(10px); padding:30px; border-radius:20px; border: 1px solid rgba(255,255,255,0.1); }
        h2{ font-family: Orbitron; font-size: 18px; margin-bottom: 20px; color: #00e5ff; }
        
        label{ display:block; margin-top:15px; font-size: 13px; color: #9adfff; }
        input, textarea, select{ width:100%; margin-top:8px; padding:12px; border-radius:10px; border:none; background: #051a30; color: white; font-size: 14px; }
        
        .btn{ padding:12px 24px; border-radius:10px; border:none; cursor:pointer; font-weight: bold; transition: 0.3s; margin-top: 20px; width: 100%; }
        .btn-primary{ background:#00e5ff; color:#041424; }
        .btn-primary:hover{ background: #00b8cc; }
        .btn-outline{ background: transparent; border: 1px solid #ff4b2b; color: #ff4b2b; }
        .btn-outline:hover{ background: #ff4b2b; color: white; }

        .workshop-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 4px solid #00e5ff; }
        .workshop-item h3 { font-size: 16px; }
        .workshop-meta { font-size: 12px; color: #888; margin-top: 5px; }
        .workshop-actions { margin-top: 10px; display: flex; gap: 10px; }
        .action-link { font-size: 12px; text-decoration: none; color: #00e5ff; cursor: pointer; }
        .delete-link { color: #ff4b2b; }

        /* Modal simple style */
        #qModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; justify-content:center; align-items:center; }
        .modal-content { background:#051a30; padding:30px; border-radius:20px; width:500px; border:1px solid #00e5ff; }
    </style>
</head>
<body>

<div class="header">
    <div style="display: flex; align-items: center; gap: 15px;">
        <h1>⚛ SciSpark Manager</h1>
    </div>
    <button class="btn" style="width: auto; margin:0;" onclick="location.href='/'">Home</button>
</div>

<div class="container">
    <!-- CREATE SECTION -->
    <div class="panel">
        <h2>New Workshop</h2>
        <form action="/create-workshop" method="POST">
            <label>Workshop Title</label>
            <input name="title" type="text" placeholder="e.g. Gravity Experiments" required>

            <label>Description</label>
            <textarea name="description" style="height: 80px;"></textarea>

            <label>Level</label>
            <select name="level">
                <option value="lower_primary">Lower Primary</option>
                <option value="upper_primary">Upper Primary</option>
            </select>

            <button type="submit" class="btn btn-primary">Create Workshop</button>
        </form>
    </div>

    <!-- LIST SECTION -->
    <div class="panel">
        <h2>Existing Workshops</h2>
        {% for w in workshops %}
        <div class="workshop-item">
            <h3>{{ w.title }}</h3>
            <div class="workshop-meta">{{ w.target_level }} | {{ w.category }}</div>
            <div class="workshop-actions">
                <span class="action-link" onclick="openQuestionModal('{{ w.id }}', '{{ w.title }}')">➕ Add Question</span>
                <a href="/delete-workshop/{{ w.id }}" class="action-link delete-link" onclick="return confirm('Delete this workshop and all its questions?')">🗑 Delete</a>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<!-- Add Question Modal -->
<div id="qModal">
    <div class="modal-content">
        <h2 id="modalTitle">Add Question</h2>
        <form id="qForm" method="POST">
            <label>Question Text</label>
            <input name="question_text" required>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div><label>Option A</label><input name="option_a" required></div>
                <div><label>Option B</label><input name="option_b" required></div>
                <div><label>Option C</label><input name="option_c" required></div>
                <div><label>Option D</label><input name="option_d" required></div>
            </div>

            <label>Correct Answer (A/B/C/D)</label>
            <select name="correct_answer">
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
            </select>

            <div style="display: flex; gap: 10px;">
                <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Save Question</button>
            </div>
        </form>
    </div>
</div>

<script>
    function openQuestionModal(id, title) {
        document.getElementById('qModal').style.display = 'flex';
        document.getElementById('modalTitle').innerText = "Add Question to: " + title;
        document.getElementById('qForm').action = "/add-question/" + id;
    }
    function closeModal() {
        document.getElementById('qModal').style.display = 'none';
    }
</script>

</body>
</html>
