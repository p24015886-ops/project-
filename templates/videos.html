<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Videos | SciSparkQuiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'Poppins', sans-serif;
        background: radial-gradient(circle at top, #003a5f, #020b1a);
        color: white;
        height: 100vh;
        overflow: hidden;
    }
    .container { display: flex; height: 100vh; }
    
    /* ===== SIDEBAR ===== */
    .sidebar {
        width: 260px;
        background: linear-gradient(180deg, #051a30, #020b1a);
        padding: 25px;
        border-right: 1px solid rgba(0, 229, 255, 0.1);
        flex-shrink: 0;
    }
    .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 40px;
    }
    .logo-sidebar { height: 40px; width: auto; }
    .brand-title { font-family: 'Orbitron', sans-serif; color: #00e5ff; font-size: 20px; }
    .menu-section { font-size: 10px; text-transform: uppercase; color: rgba(255,255,255,0.3); margin: 20px 0 8px; letter-spacing: 1px; }
    .menu a {
        display: block; padding: 12px 14px; margin-bottom: 8px; border-radius: 12px;
        text-decoration: none; color: #e0f7ff; background: rgba(255,255,255,0.05); transition: 0.3s; font-size: 14px;
    }
    .menu a:hover, .menu a.active { background: rgba(0,229,255,0.25); transform: translateX(6px); color: #fff; }

    .main { flex: 1; padding: 40px 50px; overflow-y: auto; }
    .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
    .cat-card { cursor: pointer; text-align: center; }
    .cat-card:hover { transform: translateY(-5px); border-color: #00e5ff; background: rgba(0,229,255,0.1); }
    
    .main::-webkit-scrollbar { width: 8px; }
    .main::-webkit-scrollbar-thumb { background: rgba(0, 229, 255, 0.3); border-radius: 10px; }
</style>
</head>
<body class="flex">
<div class="container w-full">
    <div class="sidebar">
        <div class="brand">
            <img src="{{ url_for('static', filename='images/company-logo.png') }}" class="logo-sidebar" alt="Logo">
            <div class="brand-title">GRAVITON</div>
        </div>
        <div class="menu">
            <div class="menu-section">Main</div>
            <a href="{{ url_for('home') }}">🏠 Home</a>
            <a href="{{ url_for('videos') }}" class="active">📹 Videos</a>
            <div class="menu-section">Staff</div>
            <a href="{{ url_for('make_quiz') }}">📝 Create Quiz</a>
            <div class="menu-section">Students</div>
            <a href="{{ url_for('category') }}">🚀 Start Quiz</a>
        </div>
    </div>

    <main class="main">
        <div id="categoryView">
            <h1 class="text-3xl font-bold text-cyan-400 mb-8 font-['Orbitron']">Workshop Videos 📺</h1>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                <div class="glass p-8 rounded-2xl cat-card" onclick="showCategory('Physics')">
                    <div class="text-5xl mb-4">⚛️</div>
                    <h2 class="text-xl font-bold">Physics</h2>
                </div>
                <div class="glass p-8 rounded-2xl cat-card" onclick="showCategory('Chemistry')">
                    <div class="text-5xl mb-4">🧪</div>
                    <h2 class="text-xl font-bold">Chemistry</h2>
                </div>
                <div class="glass p-8 rounded-2xl cat-card" onclick="showCategory('Biology')">
                    <div class="text-5xl mb-4">🧬</div>
                    <h2 class="text-xl font-bold">Biology</h2>
                </div>
                <div class="glass p-8 rounded-2xl cat-card" onclick="showCategory('General')">
                    <div class="text-5xl mb-4">🌍</div>
                    <h2 class="text-xl font-bold">General</h2>
                </div>
            </div>
        </div>

        <div id="videoListView" class="hidden">
            <button onclick="backToCategories()" class="text-cyan-400 mb-6 flex items-center gap-2 hover:underline">
                ← Back to Categories
            </button>
            <h1 id="selectedCatTitle" class="text-2xl font-bold text-white mb-8 font-['Orbitron']">Videos</h1>
            <div id="videosGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Videos injected by JavaScript -->
            </div>
        </div>
    </main>
</div>

<script>
    const videos = [
        { title: "Science of Light", desc: "Reflection and refraction.", cat: "Physics", url: "https://www.youtube.com/embed/SqkdT_kb3Lw" },
        { title: "Electric Currents", desc: "Understanding circuits.", cat: "Physics", url: "https://www.youtube.com/embed/o_En8hmncR8" },
        { title: "Newton's Laws", desc: "Classical mechanics.", cat: "Physics", url: "https://www.youtube.com/embed/kKKM8Y-u7ds" },
        { title: "The Shell Model", desc: "Complex structure of atoms.", cat: "Chemistry", url: "https://www.youtube.com/embed/v6W_YpPrjV4" },
        { title: "Chemical Reactions", desc: "Exothermic vs Endothermic.", cat: "Chemistry", url: "https://www.youtube.com/embed/T6i7mNfRAn8" },
        { title: "How DNA Works", desc: "Biological blueprint.", cat: "Biology", url: "https://www.youtube.com/embed/yi0hwFDQTSQ" },
        { title: "Photosynthesis", desc: "How plants make energy.", cat: "Biology", url: "https://www.youtube.com/embed/UPBMG5EYydo" },
        { title: "Interactive Workshop", desc: "Live science demonstrations.", cat: "General", url: "https://www.youtube.com/embed/PomYLW0Jxa8" },
        { title: "The Water Cycle", desc: "Earth's recycling system.", cat: "General", url: "https://www.youtube.com/embed/al-do-HGuIk" }
    ];

    function showCategory(cat) {
        document.getElementById('categoryView').classList.add('hidden');
        document.getElementById('videoListView').classList.remove('hidden');
        document.getElementById('selectedCatTitle').innerText = cat + " Videos";
        
        const grid = document.getElementById('videosGrid');
        grid.innerHTML = "";
        
        const filtered = videos.filter(v => v.cat === cat);
        if(filtered.length === 0) {
            grid.innerHTML = "<p class='text-white/40'>No videos available for this category yet.</p>";
            return;
        }

        filtered.forEach(v => {
            const card = `
                <div class="glass rounded-xl overflow-hidden flex flex-col">
                    <iframe class="w-full aspect-video" src="${v.url}" frameborder="0" allowfullscreen></iframe>
                    <div class="p-4 flex-1">
                        <h3 class="font-bold text-cyan-400 mb-2">${v.title}</h3>
                        <p class="text-xs text-blue-100/70">${v.desc}</p>
                    </div>
                </div>
            `;
            grid.innerHTML += card;
        });
    }

    function backToCategories() {
        document.getElementById('categoryView').classList.remove('hidden');
        document.getElementById('videoListView').classList.add('hidden');
    }
</script>
</body>
</html>
